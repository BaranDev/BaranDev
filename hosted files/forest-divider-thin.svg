  <rect x="422" y="0" width="6" height="2" fill="#4a7a4a"/>
  <rect x="424" y="8" width="2" height="4" fill="#5c3a1e"/>

  <!-- Firefly -->
  <rect x="400" y="0" width="2" height="2" fill="#FFD700" opacity="0.9"/>
  <rect x="460" y="4" width="2" height="2" fill="#FFD700" opacity="0.6"/>

  <!-- Tiny bush -->
  <rect x="490" y="8" width="8" height="2" fill="#2F5233"/>
  <rect x="492" y="6" width="4" height="2" fill="#4a7a4a"/>

  <!-- Tiny tree 5 -->
  <rect x="550" y="6" width="6" height="6" fill="#1a3a1a"/>
  <rect x="552" y="4" width="4" height="2" fill="#2F5233"/>
  <rect x="552" y="2" width="4" height="2" fill="#4a7a4a"/>
  <rect x="554" y="0" width="2" height="2" fill="#8FBC8F"/>
  <rect x="554" y="8" width="2" height="4" fill="#5c3a1e"/>

  <!-- Firefly -->
  <rect x="520" y="2" width="2" height="2" fill="#FFD700" opacity="0.7"/>

  <!-- Tiny bush -->
  <rect x="620" y="8" width="6" height="2" fill="#4a7a4a"/>
  <rect x="622" y="6" width="4" height="2" fill="#8FBC8F"/>

  <!-- Tiny tree 6 -->
  <rect x="670" y="4" width="8" height="8" fill="#1a3a1a"/>
  <rect x="672" y="2" width="6" height="2" fill="#2F5233"/>
  <rect x="672" y="0" width="6" height="2" fill="#4a7a4a"/>
  <rect x="674" y="8" width="2" height="4" fill="#5c3a1e"/>

  <!-- Firefly -->
  <rect x="640" y="0" width="2" height="2" fill="#FFD700" opacity="0.8"/>
