  <!-- Tiny tree 3 -->
  <rect x="310" y="6" width="6" height="6" fill="#1a3a1a"/>
  <rect x="312" y="4" width="4" height="2" fill="#2F5233"/>
  <rect x="312" y="2" width="4" height="2" fill="#8FBC8F"/>
  <rect x="314" y="0" width="2" height="2" fill="#4a7a4a"/>
  <rect x="314" y="8" width="2" height="4" fill="#5c3a1e"/>

  <!-- Firefly -->
