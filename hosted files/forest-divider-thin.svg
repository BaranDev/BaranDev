<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 16" width="800" height="16">
  <!-- Thin pixel art forest divider: mossy ground line with tiny trees and fireflies -->
  <!-- Ground base -->
  <rect x="0" y="12" width="800" height="4" fill="#2F5233"/>
  <rect x="0" y="10" width="800" height="2" fill="#3d6b3d" opacity="0.6"/>

  <!-- Tiny tree 1 -->
  <rect x="60" y="6" width="6" height="6" fill="#1a3a1a"/>
  <rect x="62" y="4" width="4" height="2" fill="#2F5233"/>
  <rect x="62" y="2" width="4" height="2" fill="#4a7a4a"/>
  <rect x="64" y="0" width="2" height="2" fill="#8FBC8F"/>
  <rect x="64" y="8" width="2" height="4" fill="#5c3a1e"/>

  <!-- Tiny bush -->
  <rect x="120" y="8" width="6" height="2" fill="#4a7a4a"/>
  <rect x="122" y="6" width="4" height="2" fill="#8FBC8F"/>

  <!-- Tiny tree 2 -->
  <rect x="190" y="4" width="8" height="8" fill="#1a3a1a"/>
  <rect x="192" y="2" width="6" height="2" fill="#2F5233"/>
  <rect x="192" y="0" width="6" height="2" fill="#4a7a4a"/>
  <rect x="194" y="8" width="2" height="4" fill="#5c3a1e"/>

  <!-- Firefly -->
